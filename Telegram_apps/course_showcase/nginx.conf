# Конфиг nginx для Course Showcase WebApp
# Скопировать на сервер: /etc/nginx/sites-available/course_showcase
# Затем: ln -s /etc/nginx/sites-available/course_showcase /etc/nginx/sites-enabled/
#
# ⚠️  Нужен HTTPS — Telegram WebApp работает ТОЛЬКО по HTTPS!
# Для получения SSL-сертификата используй certbot:
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d твой-домен.ru
#
# Если домена нет — используй Cloudflare Tunnel или ngrok (см. README)

server {
    listen 80;
    server_name твой-домен.ru;   # ← замени на свой домен

    # Редирект на HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name твой-домен.ru;   # ← замени на свой домен

    # SSL (certbot заполнит автоматически)
    # ssl_certificate     /etc/letsencrypt/live/твой-домен.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/твой-домен.ru/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Папка с файлами WebApp
    root /var/www/course_showcase;
    index index.html;

    # Заголовки безопасности и CORS (Telegram требует)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        try_files $uri $uri/ /index.html;
        
        # Кэширование статики
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
    }
}
